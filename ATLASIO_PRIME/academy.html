<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlasio Prime | Academy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e5e7eb; }
        .gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f2d472 100%); }
        .glass-panel { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .ai-glow { box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        [dir="rtl"] { text-align: right; }
    </style>
</head>
<body class="min-h-screen flex">
    <aside class="w-64 glass-panel border-r border-yellow-900/20 p-6 hidden md:block">
        <div class="mb-10 text-2xl font-bold tracking-tighter text-white flex items-center gap-2">
            <span class="gold-gradient w-8 h-8 rounded-lg flex items-center justify-center text-black text-xs">A</span>
            ATLASIO <span class="text-yellow-500 font-light">PRIME</span>
        </div>
        <nav class="space-y-4">
            <a href="#" class="flex items-center gap-3 p-3 rounded-lg bg-yellow-500/10 text-yellow-500">📊 Dashboard</a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/5 transition">📚 Kurslarım</a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/5 transition">🎓 Eğitmen Stüdyosu</a>
            <a href="#" class="flex items-center gap-3 p-3 rounded-lg hover:bg-white/5 transition">📈 Raporlar</a>
        </nav>
    </aside>
    <main class="flex-1 p-8 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-semibold">Hoş Geldin, <span class="text-yellow-500">Mustafa</span></h1>
            <div class="flex gap-2">
                <button onclick="changeLang('ru')" class="px-4 py-2 rounded-full glass-panel hover:border-yellow-500 transition text-xs">RU</button>
                <button onclick="changeLang('ar')" class="px-4 py-2 rounded-full glass-panel hover:border-yellow-500 transition text-xs">AR</button>
                <div class="w-10 h-10 rounded-full gold-gradient border-2 border-yellow-600 flex items-center justify-center text-black font-bold">M</div>
            </div>
        </header>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-panel p-6 rounded-2xl border border-yellow-500/20">
                <p class="text-gray-400 text-sm mb-1">Aktif Öğrenci</p>
                <p class="text-3xl font-bold">1.2K</p>
            </div>
            <div class="glass-panel p-6 rounded-2xl border border-yellow-500/20">
                <p class="text-gray-400 text-sm mb-1">Tamamlama Oranı</p>
                <p class="text-3xl font-bold text-green-500">%78</p>
            </div>
            <div class="glass-panel p-6 rounded-2xl border border-yellow-500/20">
                <p class="text-gray-400 text-sm mb-1">Aktif Kurs</p>
                <p class="text-3xl font-bold">24</p>
            </div>
        </div>
        <section class="glass-panel p-8 rounded-3xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Devam Eden Eğitimler</h2>
                <button class="text-yellow-500 text-sm hover:underline">Tümünü Gör</button>
            </div>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-4 bg-white/5 rounded-xl border border-white/5 hover:border-yellow-500/30 transition">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gray-800 rounded-lg flex items-center justify-center text-xl">🤖</div>
                        <div>
                            <h3 class="font-medium">AI & Machine Learning Essentials</h3>
                            <p class="text-xs text-gray-500">Kurumsal Sertifika Programı</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-semibold">%65 Tamamlandı</p>
                        <div class="w-32 h-1.5 bg-gray-700 rounded-full mt-2">
                            <div class="w-2/3 h-full gold-gradient rounded-full"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <button class="fixed bottom-8 right-8 w-16 h-16 gold-gradient rounded-full flex items-center justify-center text-black text-2xl ai-glow z-50">✨</button>
    <script>
        function changeLang(lang) {
            document.body.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            alert(lang.toUpperCase() + " diline geçiş yapıldı.");
        }
    </script>
</body>
</html>
