<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atlasio Studio | Sınav Hazırlama</title>
    <link rel="stylesheet" href="master_design.css">
</head>
<body>
    <div class="main-content" style="margin-left:0; padding:40px;">
        <div class="premium-card">
            <h2 class="gold-text">YENİ SINAV OLUŞTUR</h2>
            <div class="form-group">
                <label>Sınav Adı</label>
                <input type="text" placeholder="Haftalık Değerlendirme #1">
            </div>
            <hr>
            <div id="questions-area">
                <div style="background:#f4f4f4; padding:15px; margin-bottom:10px; border-radius:8px;">
                    <p><b>Soru 1:</b> <input type="text" placeholder="Soru metnini girin..." style="width:80%;"></p>
                    <input type="text" placeholder="A şıkkı" style="width:45%; margin:5px;">
                    <input type="text" placeholder="B şıkkı" style="width:45%; margin:5px;">
                    <input type="text" placeholder="C şıkkı" style="width:45%; margin:5px;">
                    <input type="text" placeholder="D şıkkı" style="width:45%; margin:5px;">
                </div>
            </div>
            <button onclick="alert('Soru Eklendi')" style="background:#eee; border:1px solid #ccc; padding:10px;">+ Yeni Soru Ekle</button>
            <button class="btn-join" style="float:right;">SINAVI MÜHÜRLÜ VE YAYINLA</button>
        </div>
    </div>
</body>
</html>
