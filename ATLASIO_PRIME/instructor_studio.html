<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atlasio Studio | İçerik Yönetimi</title>
    <link rel="stylesheet" href="master_design.css">
    <style>
        .studio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .upload-zone { border: 2px dashed #ccc; padding: 40px; text-align: center; border-radius: 12px; transition: 0.3s; }
        .upload-zone:hover { border-color: var(--gold); background: #f9f9f9; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.8rem; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #eee; margin-right: 5px; border-radius: 5px; }
        .tab-btn.active { background: var(--sidebar); color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>ATLASIO STUDIO</h2>
        <a href="dashboard.html">🏠 Ana Panel</a>
        <a href="#" class="active">📹 İçerik Yükle</a>
        <a href="instructor_exams.html">📝 Sınav Oluştur</a>
        <a href="students_list.html">👥 Öğrenci Takibi</a>
    </div>

    <div class="main-content">
        <div class="status-bar">
            <h3 class="gold-text">İÇERİK YÜKLEME MERKEZİ</h3>
            <div>Depolama: 4.2 GB / 100 GB</div>
        </div>

        <div class="studio-grid">
            <div class="premium-card">
                <h4>1. Ders Bilgileri</h4>
                <div class="form-group">
                    <label>Ders Başlığı</label>
                    <input type="text" placeholder="Örn: İleri Seviye Python Penetrasyon Testi">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select>
                        <option>Siber Güvenlik</option>
                        <option>Yazılım Geliştirme</option>
                        <option>Yapay Zeka</option>
                    </select>
                </div>
                <div class="upload-zone">
                    <p>📹 Video dosyasını sürükleyin veya seçin</p>
                    <button class="btn-join">DOSYA SEÇ</button>
                </div>
            </div>

            <div class="premium-card">
                <h4>2. Kaynaklar ve Ekler</h4>
                <div class="form-group">
                    <label>Ders Dökümanı (PDF)</label>
                    <input type="file">
                </div>
                <div class="form-group">
                    <label>Harici Bağlantı (GitHub/Link)</label>
                    <input type="text" placeholder="https://github.com/...">
                </div>
                <button class="btn-join" style="width:100%; margin-top:50px; background:green;">DERSI YAYINLA</button>
            </div>
        </div>
    </div>
</body>
</html>
