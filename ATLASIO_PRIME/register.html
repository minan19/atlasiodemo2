<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ATLASIO PRIME | Operatör Kayıt</title>
    <link rel="stylesheet" href="master_design.css">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .register-box { 
            width: 400px; padding: 40px; border: 1px solid var(--gold); background: rgba(10,10,10,0.95); 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.1); 
        }
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--gold); text-align: center; }
        .reg-btn { width: 100%; padding: 15px; background: none; border: 1px solid var(--gold); color: var(--gold); cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .reg-btn:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body><div class="loader"></div>
    <div class="register-box">
        <h2 class="gold-text" style="text-align:center;">YENİ OPERATÖR KAYDI</h2>
        <p style="color:#555; font-size:0.7rem; text-align:center;">ATLASIO ACADEMY BÜNYESİNE KATILIN</p>
        <input type="text" placeholder="AD SOYAD">
        <input type="email" placeholder="KURUMSAL E-POSTA">
        <input type="password" placeholder="ERİŞİM ŞİFRESİ">
        <select>
            <option>ALAN SEÇİN: SİBER GÜVENLİK</option>
            <option>ALAN SEÇİN: YAZILIM GELİŞTİRME</option>
            <option>ALAN SEÇİN: VERİ ANALİZİ</option></select><div style="margin-top:10px; font-size:0.6rem; color:#555;"><input type="checkbox" required> Atlasio Etik Kullanım Sözleşmesini okudum ve kabul ediyorum.</div>
        </select>
        <button class="reg-btn" onclick="registerSuccess()">MÜHRÜ OLUŞTUR</button>
        <p style="text-align:center; margin-top:15px;"><a href="index.html" style="color:var(--gold); font-size:0.8rem; text-decoration:none;">Zaten bir hesabınız var mı? Giriş Yap</a></p>
    </div>

    <script>
        function registerSuccess() {
            alert("Kayıt Başarılı! Operatör kodunuz oluşturuldu. Giriş sayfasına yönlendiriliyorsunuz.");
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
