<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atlasio Prime | SmartBoard</title>
    <link rel="stylesheet" href="master_design.css">
    <style>
        body { background-color: #f0f2f5 !important; }
        .board-container {
            display: grid;
            grid-template-columns: 80px 1fr 250px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 100px);
        }
        .toolbar {
            background: var(--sidebar);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 20px;
        }
        .tool-icon {
            color: #666;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .tool-icon:hover, .tool-icon.active { color: var(--gold); }
        
        .canvas-area {
            background: white;
            border-radius: 15px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
            border: 2px solid #e0e0e0;
        }
        canvas { width: 100%; height: 100%; cursor: crosshair; }
        
        .layer-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: var(--card-shadow);
        }
        .color-dot {
            width: 25px; height: 25px; border-radius: 50%; display: inline-block;
            margin: 5px; cursor: pointer; border: 2px solid transparent;
        }
        .color-dot:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="status-bar" style="margin: 20px;">
        <div class="gold-text">SMARTBOARD // CANLI ÇİZİM MODU</div>
        <div style="color:red; font-weight:bold;">● KAYITTA</div>
    </div>

    <div class="board-container">
        <div class="toolbar">
            <div class="tool-icon active">✏️</div>
            <div class="tool-icon">square</div>
            <div class="tool-icon">◯</div>
            <div class="tool-icon">➡️</div>
            <div class="tool-icon">T</div>
            <div class="tool-icon" style="margin-top:auto;">🗑️</div>
        </div>

        <div class="canvas-area">
            <div style="position:absolute; top:20px; right:20px; color:#ccc; font-family:monospace;">GRID_SYSTEM_V1.0</div>
            <canvas id="boardCanvas"></canvas>
        </div>

        <div class="layer-panel">
            <h4 class="gold-text">FIRÇA AYARLARI</h4>
            <div class="color-dot" style="background:#000;"></div>
            <div class="color-dot" style="background:red;"></div>
            <div class="color-dot" style="background:blue;"></div>
            <div class="color-dot" style="background:var(--gold);"></div>
            <hr>
            <h4>KATMANLAR</h4>
            <p style="font-size:0.8rem; color:#666;">[✓] Ana Mimari</p>
            <p style="font-size:0.8rem; color:#666;">[✓] Network Şeması</p>
            <button class="btn-join" style="width:100%; margin-top:20px;">EKRAN PAYLAŞ</button>
        </div>
    </div>
</body>
</html>
