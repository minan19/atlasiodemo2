<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ATLASIO PRIME | Secure Login</title>
    <link rel="stylesheet" href="master_design.css">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
        .login-container { perspective: 1000px; }
        .login-box { 
            width: 350px; padding: 40px; border: 1px solid var(--gold); background: rgba(10,10,10,0.95); 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); transition: all 1s ease-in-out;
        }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--gold); text-align: center; }
        .access-btn { width: 100%; padding: 15px; background: var(--gold); border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .access-btn:hover { background: #fff; box-shadow: 0 0 20px var(--gold); }
        
        /* Geçiş Efekti */
        .access-granted { transform: rotateY(90deg) scale(0); opacity: 0; }
    </style>
</head>
<body><div class="loader"></div>
    <div class="login-container" id="container">
        <div class="login-box" id="box">
            <h2 class="gold-text" style="text-align:center;">ATLASIO_PRIME</h2>
            <p style="color:#555; font-size:0.7rem; text-align:center;">SİSTEME GİRİŞ İÇİN KİMLİK DOĞRULAYIN</p>
            <input type="text" id="user" placeholder="OPERATÖR">
            <input type="password" id="pass" placeholder="ANAHTAR">
            <button class="access-btn" onclick="verify()">ERİŞİMİ BAŞLAT</button><p style="text-align:center; margin-top:15px;"><a href="register.html" style="color:var(--gold); font-size:0.8rem; text-decoration:none;">Yeni Operatör Kaydı</a></p>
        </div>
    </div>

    <script>
        function verify() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if(u === "ATLASIO" && p === "PRIME2026") {
                // Ses Efekti (Tarayıcı izin verirse)
                const audio = new Audio('https://www.soundjay.com/buttons/sounds/button-37a.mp3');
                audio.play();
                
                document.getElementById('box').classList.add('access-granted');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
            } else {
                alert("YETKİSİZ ERİŞİM DENEMESİ KAYDEDİLDİ!");
            }
        }
    </script>
</body>
</html>
