name: Atlasio CI

on:
  push:
    branches: ["main", "master", "codex/**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-secret
      DATABASE_URL: postgresql://atlasio:atlasio@localhost:5432/atlasio?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Prisma Generate
        run: pnpm --filter @atlasio/api prisma:generate

      - name: API Tests
        run: pnpm --filter @atlasio/api test

      - name: Typecheck
        run: pnpm typecheck

      - name: Web Lint
        run: pnpm --filter @atlasio/web lint

      - name: Build
        run: pnpm build
